<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dice Logger</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f13;--bg2:#1a1a24;--bg3:#242433;--bg4:#2e2e40;
  --border:#3a3a52;--text:#e8e8f0;--text2:#a0a0b8;--text3:#6a6a80;
  --accent:#7c6af7;--accent2:#5a4fd4;--accent3:#9d8fff;
  --crit:#ffd700;--fumble:#ff4444;--success:#4ade80;
  --danger:#f87171;
}
.light{
  --bg:#f4f3ff;--bg2:#ffffff;--bg3:#ebebf8;--bg4:#ddddf0;
  --border:#c4c3e0;--text:#1a1a2e;--text2:#4a4a6a;--text3:#8a8aa0;
  --accent:#6c5ce7;--accent2:#5548c8;--accent3:#8074f0;
  --crit:#b8860b;--fumble:#cc0000;--success:#16a34a;
  --danger:#dc2626;
}
body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;font-size:14px;height:100vh;overflow:hidden;transition:background .3s,color .3s}
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.header{background:var(--bg2);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap}
.header-title{font-size:18px;font-weight:700;color:var(--accent);letter-spacing:.5px;flex:1;min-width:120px}
.header-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:12px}
.tab-bar{display:flex;background:var(--bg3);border-bottom:1px solid var(--border);flex-shrink:0}
.tab{flex:1;padding:8px 4px;text-align:center;cursor:pointer;font-size:11px;font-weight:600;color:var(--text3);border:none;background:none;transition:all .2s;letter-spacing:.3px}
.tab.active{color:var(--accent);border-bottom:2px solid var(--accent);background:var(--bg2)}
.tab:hover:not(.active){color:var(--text2);background:var(--bg4)}
.panel-content{flex:1;overflow-y:auto;padding:10px}
.panel-label{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--text3);text-transform:uppercase;margin-bottom:6px}
.btn{padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg3);color:var(--text);cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--bg4);border-color:var(--accent)}
.btn:active{transform:scale(0.96)}
.btn-accent{background:var(--accent);border-color:var(--accent2);color:#fff}
.btn-accent:hover{background:var(--accent2)}
.btn-sm{padding:4px 8px;font-size:11px;border-radius:6px}
.btn-icon{width:30px;height:30px;padding:0;display:flex;align-items:center;justify-content:center;border-radius:8px}
.btn-danger{border-color:var(--danger);color:var(--danger)}
.btn-danger:hover{background:rgba(248,113,113,.1)}
input[type=text].styled,input[type=number].styled,select.styled{background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:6px 10px;font-size:13px;width:100%}
input[type=text].styled:focus,input[type=number].styled:focus,select.styled:focus{outline:none;border-color:var(--accent)}
select.styled{cursor:pointer}
.section-card{background:var(--bg2);border-radius:12px;border:1px solid var(--border);padding:14px}
.section-title{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--text3);text-transform:uppercase;margin-bottom:10px}
.session-item{padding:8px 10px;border-radius:8px;cursor:pointer;border:1px solid transparent;display:flex;align-items:center;gap:8px;margin-bottom:4px}
.session-item:hover{background:var(--bg3);border-color:var(--border)}
.session-item.active-session{background:rgba(124,106,247,.12);border-color:var(--accent)}
.session-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0}
.session-name{font-size:12px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.session-meta{font-size:10px;color:var(--text3)}
.history-entry{background:var(--bg3);border-radius:10px;border:1px solid var(--border);padding:10px 12px;margin-bottom:6px}
.history-entry.crit-entry{border-color:rgba(255,215,0,.4);background:rgba(255,215,0,.04)}
.history-entry.fumble-entry{border-color:rgba(255,68,68,.3);background:rgba(255,68,68,.04)}
.entry-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.entry-dice{font-size:20px;font-weight:700;display:inline-flex;align-items:center;gap:6px;flex-wrap:wrap}
.entry-total{font-size:20px;font-weight:900;color:var(--accent)}
.entry-total.crit{color:var(--crit)}
.entry-total.fumble{color:var(--fumble)}
.entry-time{font-size:10px;color:var(--text3);margin-top:6px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center}
.stat-value{font-size:20px;font-weight:800;color:var(--accent)}
.stat-label{font-size:10px;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:100}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:20px;width:340px;max-width:95vw}
.modal h3{font-size:16px;font-weight:700;margin-bottom:14px}
.modal label{font-size:12px;color:var(--text2);display:block;margin-bottom:5px;margin-top:10px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.empty-state{text-align:center;color:var(--text3);font-size:12px;padding:20px 0}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:8px 18px;border-radius:20px;font-size:12px;font-weight:600;z-index:200;transition:opacity .3s;pointer-events:none}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
@media(max-width:768px){
  .sidebar{display:none}
}

.log-form-grid{display:flex;gap:6px;flex-wrap:wrap;align-items:flex-end;margin-bottom:4px}
.log-field{display:flex;flex-direction:column;gap:3px;min-width:0}
.log-field label{font-size:10px;font-weight:700;letter-spacing:.5px;color:var(--text3);text-transform:uppercase;white-space:nowrap}
.log-field input,.log-field select{background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:5px 7px;font-size:12px;min-width:0;width:100%;box-sizing:border-box}
.log-field input:focus,.log-field select:focus{outline:none;border-color:var(--accent)}
.lf-xs{flex:0 0 54px}.lf-sm{flex:0 0 72px}.lf-md{flex:1 1 90px}.lf-lg{flex:2 1 130px}.lf-xl{flex:3 1 160px}
.log-field-check{display:flex;flex-direction:row-reverse;align-items:center;justify-content:flex-end;gap:6px;flex:0 0 auto}
.log-field-check label{font-size:10px;font-weight:700;letter-spacing:.5px;color:var(--text3);text-transform:uppercase;white-space:nowrap;cursor:pointer}
.help-icon{display:inline-flex;align-items:center;justify-content:center;width:12px;height:12px;border-radius:50%;border:1px solid var(--text3);color:var(--text3);font-size:9px;font-weight:700;line-height:1;cursor:pointer;margin-left:4px;text-transform:none;letter-spacing:0;vertical-align:middle}
.help-icon:hover{border-color:var(--accent);color:var(--accent)}
.field-help-popup{position:fixed;z-index:200;background:var(--bg4);border:1px solid var(--accent);border-radius:8px;padding:8px 10px;font-size:11px;line-height:1.4;color:var(--text);max-width:260px;box-shadow:0 4px 16px rgba(0,0,0,.35);text-transform:none;letter-spacing:0;font-weight:400}
.log-field-check input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;margin:0}
.miss-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.5px;background:rgba(248,113,113,.15);color:var(--danger);border:1px solid var(--danger)}
.entry-comment{font-size:13px;color:var(--text2);font-style:italic}
.entry-notation{font-size:13px;color:var(--text2)}
.entry-notation-row{display:flex;align-items:center;gap:10px;margin-top:3px;flex-wrap:wrap}
</style>

<script>
/*
 * Dice Logger
 * ------------------------------------------------------------------
 * A manual dice-roll logbook for tabletop RPG sessions. The user
 * types in results they rolled at the table (or with physical dice)
 * and this app keeps a per-session history, running stats, and a
 * CSV export. All state is persisted to localStorage under the key
 * "diceLoggerv2".
 * ------------------------------------------------------------------
 */

/** Skill/check names offered in the "Label" dropdown when logging or editing a roll. */
const SKILLS=['Accounting','Alertness','Anthropology','Archeology','Art','Artillery','Athletics','Bureaucracy','Computer Science','Craft','Criminology','Demolitions','Disguise','Dodge','Drive','Firearms','First Aid','Forensics','Heavy Machinery','Heavy Weapons','History','HUMINT','Law','Medicine','Melee Weapons','Military Science','Navigate','Occult','Persuade','Pharmacy','Pilot','Psychotherapy','Ride','Science','Search','SIGINT','Stealth','Surgery','Survival','Swim','Unarmed Combat','Unnatural','Foreigh Languages & Other Skills','Sanity Check'];

/**
 * Builds the <option> list for a skill/label <select>, marking `selected` as chosen.
 * @param {string} [selected] - The currently selected skill name, if any.
 * @returns {string} HTML for the <option> elements.
 */
function skillOptions(selected){
  return '<option value=""'+(selected?'':' selected')+'>—</option>'+SKILLS.map(s=>`<option value="${esc(s)}"${s===selected?' selected':''}>${esc(s)}</option>`).join('');
}

/**
 * Parses dice notation (e.g. "2d6+1", "d20", "1d100-3", "d%+2") into its parts.
 * @param {string} str - Raw dice notation entered by the user.
 * @returns {{count:number,sides:number,modifier:number}|null} Parsed parts, or null if invalid.
 */
function parseDiceNotation(str){
  const m=/^\s*(\d+)?d(\d+|%)\s*([+-]\s*\d+)?\s*$/i.exec(str||'');
  if(!m)return null;
  const count=m[1]?parseInt(m[1],10):1;
  const sides=m[2]==='%'?100:parseInt(m[2],10);
  const modifier=m[3]?parseInt(m[3].replace(/\s+/g,''),10):0;
  if(!count||count<1||!sides||sides<1)return null;
  return {count,sides,modifier};
}

/**
 * Parses a colon-separated list of individual die values (e.g. "4:9" or "2:11:+1") into integers.
 * @param {string} str - Raw text from the Dice Values field.
 * @returns {number[]|null} Array of parsed values (empty array if str is blank), or null if the format is invalid.
 */
function parseIndivValues(str){
  if(!str)return [];
  if(!/^\s*[+-]?\d+(\s*:\s*[+-]?\d+)*\s*$/.test(str))return null;
  return str.split(':').map(v=>parseInt(v.trim(),10));
}

/**
 * In-memory application state. Loaded from / saved to localStorage as a whole.
 * theme            - 'dark' | 'light'
 * currentSessionId - the session new rolls are logged into
 * viewingSessionId - the session currently displayed in the history/stats panels
 * sessions         - map of sessionId -> {id, name, system, player, charName, note, created, rolls[]}
 */
let S={theme:'dark',
  currentSessionId:null,viewingSessionId:null,sessions:{}};

/** Generates a short, unique-enough id for sessions and roll entries. */
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
/** Escapes a string for safe insertion into innerHTML. */
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
/** Formats a timestamp as a locale date string, e.g. "7/8/2026". */
function fDate(ts){return new Date(ts).toLocaleDateString()}
/** Formats a timestamp as a combined locale date + time string, used in history entries and CSV export. */
function fDT(ts){return fDate(ts)+' '+new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'})}

/** Loads saved state from localStorage, then guarantees at least one session exists. */
function load(){
  try{const s=JSON.parse(localStorage.getItem('diceLoggerv2')||'null');if(s)Object.assign(S,s);}catch(e){}
  if(!Object.keys(S.sessions).length){const id=genId();S.sessions[id]={id,name:'Session 1',created:Date.now(),rolls:[]};S.currentSessionId=id;}
  if(!S.viewingSessionId)S.viewingSessionId=S.currentSessionId;
}
/** Persists the whole state object to localStorage. */
function save(){try{localStorage.setItem('diceLoggerv2',JSON.stringify(S))}catch(e){}}

/**
 * Switches the active sidebar tab (Sessions vs Stats) and shows the matching panel.
 * @param {string} name - 'sessions' | 'stats-side'
 * @param {HTMLElement} btn - the tab button that was clicked
 */
function switchSideTab(name,btn){
  document.querySelectorAll('.sidebar .tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  ['sessions','stats-side'].forEach(t=>{const el=document.getElementById('tab-'+t);if(el)el.style.display=t===name?'block':'none';});
  if(name==='stats-side')updateStats();
}

/** Toggles between dark and light theme and persists the choice. */
function toggleTheme(){
  S.theme=S.theme==='dark'?'light':'dark';
  document.body.className=S.theme==='light'?'light':'';
  document.getElementById('themeBtn').textContent=S.theme==='dark'?'☀':'🌙';
  save();
}

/** Renders the session list in the sidebar. */
function buildSessions(){
  const list=document.getElementById('sessionList');
  const sessions=Object.values(S.sessions).sort((a,b)=>b.created-a.created);
  list.innerHTML=sessions.map(s=>`
    <div class="session-item${s.id===S.currentSessionId?' active-session':''}" onclick="viewSession('${s.id}')">
      <div class="session-dot" style="${s.id!==S.currentSessionId?'background:var(--text3)':''}"></div>
      <div style="flex:1;min-width:0">
        <div class="session-name">${esc(s.name)}</div>
        <div class="session-meta">${fDate(s.created)} · ${s.rolls.length} rolls</div>
      </div>
      <button class="btn btn-sm" style="padding:2px 5px;font-size:10px" onclick="event.stopPropagation();openEditSession('${s.id}')" title="Edit session">✎</button>
      <button class="btn btn-sm" style="padding:2px 5px;font-size:10px;color:var(--danger)" onclick="event.stopPropagation();deleteSession('${s.id}')" title="Delete session">🗑</button>
    </div>`).join('')||'<div class="empty-state">No sessions</div>';
}

/** Switches which session's history/stats are displayed (does not change where new rolls are logged). */
function viewSession(id){
  S.viewingSessionId=id;
  const s=S.sessions[id];
  const lbl=document.getElementById('histSessionNameLabel');if(lbl)lbl.textContent=s.name;
  updateHistory();buildSessions();updateStats();
}

/** Whether the history list is currently filtered to show only rolls marked "Miss". */
let missOnly=false;
/** Toggles the miss-only filter on the history list. */
function toggleMissFilter(){
  missOnly=!missOnly;
  const btn=document.getElementById('missFilterBtn');
  if(btn)btn.classList.toggle('btn-accent',missOnly);
  updateHistory();
}

/** Renders the roll history list for the currently viewed session (respecting the miss-only filter). */
function updateHistory(){
  const sess=S.sessions[S.viewingSessionId||S.currentSessionId];
  const list=document.getElementById('historyList');
  if(!sess||!sess.rolls.length){list.innerHTML='<div class="empty-state">No rolls yet</div>';return;}
  const rolls=missOnly?sess.rolls.filter(r=>r.miss):sess.rolls;
  if(!rolls.length){list.innerHTML='<div class="empty-state">No misses logged</div>';return;}
  list.innerHTML=[...rolls].reverse().map(r=>{
    const kv=r.results.filter(d=>d.kept).map(d=>d.val);
    const isCrit=r.sides===20&&kv.length===1&&kv[0]===20;
    const isFumble=r.sides===20&&kv.length===1&&kv[0]===1;
    const noteHtml=r.rollNote
      ?`<div class="entry-note-slot" style="font-size:11px;color:var(--accent);font-weight:600;margin-top:2px;display:flex;align-items:center;gap:4px;">
          <span>${esc(r.rollNote)}</span>
          <button onclick="editRollNote('${r.id}')" style="background:none;border:none;cursor:pointer;color:var(--text3);font-size:10px;padding:0 2px;line-height:1;" title="Edit label">✎</button>
        </div>`
      :`<div class="entry-note-slot"></div>`;
    return`<div class="history-entry${isCrit?' crit-entry':isFumble?' fumble-entry':''}" id="hentry-${r.id}">
      <div class="entry-header">
        <span class="entry-dice">${esc(r.label||r.comment||r.notation||'Roll')} -&gt; <span class="entry-total${isCrit?' crit':isFumble?' fumble':''}">${r.total}</span>${r.miss?'<span class="miss-badge">MISS</span>':''}</span>
        <span style="display:flex;align-items:center;gap:6px"><button onclick="editRollFull('${r.id}')" style="background:none;border:none;cursor:pointer;color:var(--text3);padding:2px 4px;font-size:11px;border-radius:4px" title="Edit">✏</button><button onclick="deleteRoll('${r.id}')" style="background:none;border:none;cursor:pointer;color:var(--text3);padding:2px 4px;font-size:11px;border-radius:4px" title="Delete">🗑</button></span>
      </div>
      <div class="entry-notation-row"><span class="entry-notation">${esc(r.notation||'')}</span>${r.comment?`<span class="entry-comment">Comment: ${esc(r.comment)}</span>`:''}</div>
      <div class="entry-time">${fDT(r.timestamp)}</div>
      ${noteHtml}
    </div>`}).join('');
}

function editRollNote(rollId){

  if(!sess) return;

    <button onclick="updateHistory()" style="background:none;border:1px solid var(--border);border-radius:5px;color:var(--text2);padding:3px 6px;font-size:10px;cursor:pointer;">✕</button>

/** Saves the inline note edit started by editRollNote() and re-renders the history list. */
function saveRollNote(rollId){

/** Renders the roll-count/average/high/low/crit/fumble/miss summary for the currently viewed session (sidebar Stats tab). */
function updateStats(){
  const sess=S.sessions[S.viewingSessionId||S.currentSessionId];
  const grid=document.getElementById('statsGrid2');
  const nameEl=document.getElementById('statsSessionName2');
  if(!grid) return;
  if(nameEl&&sess) nameEl.textContent=sess.name;
  if(!sess||!sess.rolls.length){
    grid.innerHTML='<div style="color:var(--text3);font-size:12px;padding:16px 0;text-align:center">No rolls yet</div>';
    return;
  }
  const totals=sess.rolls.map(r=>r.total);
  const avg=totals.reduce((s,v)=>s+v,0)/totals.length;
  const max=Math.max(...totals);
  const min=Math.min(...totals);
  const crits=sess.rolls.filter(r=>{const kv=r.results.filter(d=>d.kept).map(d=>d.val);return r.sides===20&&kv.length===1&&kv[0]===20;}).length;
  const fumbles=sess.rolls.filter(r=>{const kv=r.results.filter(d=>d.kept).map(d=>d.val);return r.sides===20&&kv.length===1&&kv[0]===1;}).length;
  const misses=sess.rolls.filter(r=>r.miss).length;
  grid.innerHTML=`
    <div class="stat-card"><div class="stat-value">${sess.rolls.length}</div><div class="stat-label">Total Rolls</div></div>
    <div class="stat-card"><div class="stat-value">${avg.toFixed(1)}</div><div class="stat-label">Average</div></div>
    <div class="stat-card"><div class="stat-value">${max}</div><div class="stat-label">Highest</div></div>
    <div class="stat-card"><div class="stat-value">${min}</div><div class="stat-label">Lowest</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--crit)">${crits}</div><div class="stat-label">Crits ★</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--fumble)">${fumbles}</div><div class="stat-label">Fumbles ☠</div></div>
    <div class="stat-card"><div class="stat-value" style="color:var(--danger)">${misses}</div><div class="stat-label">Misses</div></div>`;
}

/** Returns the given value, or a single dash "-" if it is blank/empty, so exported fields are never left blank. */
function blankDash(v){
  const s=(v==null)?'':String(v).trim();
  return s?s:'-';
}

/** Exports the currently viewed session's rolls as a downloadable CSV (.csv extension, comma-separated, with a header block). */
function exportHistory(){
  const sess=S.sessions[S.viewingSessionId||S.currentSessionId];
  if(!sess){toast('No session');return;}
  const lines=[
    'Session: '+blankDash(sess.name),
    'Date: '+fDate(sess.created),
    'Game System: '+blankDash(sess.system),
    'Player Name: '+blankDash(sess.player),
    'Character Name: '+blankDash(sess.charName),
    'Session Note: '+blankDash(sess.note),
    'Total Rolls: '+sess.rolls.length,
    '---'
  ];
  lines.push('date/time,notation,roll value,dice values,miss?,label,note');
  sess.rolls.forEach(r=>{
    const diceVals=r.results.map(d=>d.dropped?'('+d.val+')':d.val).join(':');
    const miss=r.miss?'Yes':'No';
    lines.push(fDT(r.timestamp)+',' + '"'+blankDash(r.notation)+'"' + ','+r.total+',' + '"'+blankDash(diceVals)+'"' + ',' + miss + ',' + '"'+blankDash(r.label)+'"' + ',' + '"'+blankDash(r.comment)+'"');
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([lines.join('\n')],{type:'text/plain'}));
  a.download=`${sess.name.replace(/\s+/g,'-')}-rolls.csv`;a.click();
  toast('Exported!');
}

/**

function openModal(type){

  if(type==='newSession'){

/** Hides the modal dialog. */
function closeModal(){document.getElementById('modal').style.display='none';}

/** Reads the "New Session" modal fields, creates the session, and makes it the active + viewed session. */
function createSession(){
  const name=(document.getElementById('m-name').value||'').trim()||('Session '+(Object.keys(S.sessions).length+1));
  const sys=(document.getElementById('m-system')||{value:''}).value.trim();
  const plr=(document.getElementById('m-player')||{value:''}).value.trim();
  const chr=(document.getElementById('m-char')||{value:''}).value.trim();
  const nte=(document.getElementById('m-note')||{value:''}).value.trim();
  const id=genId();
  S.sessions[id]={id,name,system:sys,player:plr,charName:chr,note:nte,created:Date.now(),rolls:[]};
  S.currentSessionId=id;S.viewingSessionId=id;
  closeModal();buildSessions();updateHistory();updateStats();save();
  const lbl=document.getElementById('histSessionNameLabel');if(lbl)lbl.textContent=name;
  toast('Session created: '+name);
}

/** Opens the "Edit Session" modal for a given session id. */
function openEditSession(id){
  S._editSessionId=id;
  openModal('editSession');
}
/** Saves edits made in the "Edit Session" modal. */
function saveSessionEdit(){
  const s=S.sessions[S._editSessionId];
  if(!s)return;
  const name=(document.getElementById('m-name').value||'').trim();
  if(name)s.name=name;
  s.system=(document.getElementById('m-system').value||'').trim();
  s.player=(document.getElementById('m-player').value||'').trim();
  s.charName=(document.getElementById('m-char').value||'').trim();
  s.note=(document.getElementById('m-note').value||'').trim();
  closeModal();
  buildSessions();
  const lbl=document.getElementById('histSessionNameLabel');
  if(lbl&&(S._editSessionId===S.viewingSessionId||S._editSessionId===S.currentSessionId))lbl.textContent=s.name;
  save();
  toast('Session updated');
}

/** Deletes a session (after confirmation) and falls back to another/new session if it was the active or viewed one. */
function deleteSession(id){
  const s=S.sessions[id];
  if(!s)return;
  if(!confirm(`Delete session "${s.name}" and all ${s.rolls.length} logged roll(s)? This cannot be undone.`))return;
  delete S.sessions[id];
  if(Object.keys(S.sessions).length===0){
    const nid=genId();
    S.sessions[nid]={id:nid,name:'Session 1',created:Date.now(),rolls:[]};
    S.currentSessionId=nid;S.viewingSessionId=nid;
  }else{
    const remaining=Object.values(S.sessions).sort((a,b)=>b.created-a.created);
    if(S.currentSessionId===id)S.currentSessionId=remaining[0].id;
    if(S.viewingSessionId===id)S.viewingSessionId=remaining[0].id;
  }
  closeModal();
  const lbl=document.getElementById('histSessionNameLabel');
  const cur=S.sessions[S.viewingSessionId];
  if(lbl&&cur)lbl.textContent=cur.name;
  buildSessions();updateHistory();updateStats();save();
  toast('Session deleted');
}

/** The currently open field-help popup element, if any. */
let activeHelpPopup=null;
/** Closes the currently open field-help popup, if one is showing. */
function closeFieldHelp(){
  if(activeHelpPopup){activeHelpPopup.remove();activeHelpPopup=null;}
}
/**
 * Shows a small popup with help text next to a clicked help icon (?). Tap/click again elsewhere to dismiss.
 * @param {MouseEvent} ev - The click event on the help icon.
 * @param {string} text - The help text to display.
 */
function showFieldHelp(ev,text){
  ev.preventDefault();
  ev.stopPropagation();
  const reopening=activeHelpPopup&&activeHelpPopup.dataset.forIcon===String(ev.currentTarget._helpId);
  closeFieldHelp();
  if(reopening)return;
  const p=document.createElement('div');
  p.className='field-help-popup';
  p.textContent=text;
  document.body.appendChild(p);
  const r=ev.currentTarget.getBoundingClientRect();
  const pw=p.offsetWidth,ph=p.offsetHeight;
  let left=Math.min(r.left,window.innerWidth-pw-8);
  let top=r.bottom+6;
  if(top+ph>window.innerHeight-8)top=r.top-ph-6;
  p.style.left=Math.max(8,left)+'px';
  p.style.top=Math.max(8,top)+'px';
  ev.currentTarget._helpId=ev.currentTarget._helpId||genId();
  p.dataset.forIcon=ev.currentTarget._helpId;
  activeHelpPopup=p;
}
document.addEventListener('click',closeFieldHelp);
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeFieldHelp();});

let toastT;
/** Shows a transient toast notification with the given message. */
function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.style.opacity='1';
  clearTimeout(toastT);toastT=setTimeout(()=>t.style.opacity='0',2500);
}

/** Reads the "Log Roll" form and appends a manually-entered roll to the active session's history. */
function addManualRoll(){
  const sess=S.sessions[S.currentSessionId];
  if(!sess){toast('No active session — create one first');return;}
  const notationRaw=document.getElementById('mr-notation').value.trim();
  const parsed=parseDiceNotation(notationRaw);
  if(!parsed){toast('Enter valid dice notation, e.g. 2d6+1');return;}
  const {count:numDice,sides:diceType,modifier}=parsed;
  const totalRaw=document.getElementById('mr-total').value.trim();
  const indivStr=document.getElementById('mr-indiv').value.trim();
  const comment=document.getElementById('mr-comment').value.trim();
  const label=document.getElementById('mr-label').value.trim();
  const miss=document.getElementById('mr-miss').checked;
  if(!totalRaw){toast('Enter a total roll value');return;}
  const totalVal=parseInt(totalRaw);
  if(isNaN(totalVal)){toast('Total must be a number');return;}
  const indivVals=parseIndivValues(indivStr);
  if(indivVals===null){toast('Dice Values must be colon-separated, e.g. 4:9');return;}
  const results=indivVals.length>0?indivVals.map(v=>({val:v,kept:true,dropped:false})):[{val:totalVal-modifier,kept:true,dropped:false}];
  const roll={id:genId(),timestamp:Date.now(),notation:notationRaw,count:numDice,sides:diceType,modifier,total:totalVal,results,label,comment,miss,rollNote:'',mode:'none'};
  sess.rolls.push(roll);
  if(sess.rolls.length>500)sess.rolls.shift();
  clearManualForm();updateHistory();updateStats();save();
  toast('Roll logged!');
}
/** Resets the "Log Roll" form fields back to their defaults. */
function clearManualForm(){
  ['mr-total','mr-indiv','mr-comment'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  const n=document.getElementById('mr-notation');if(n)n.value='';
  const l=document.getElementById('mr-label');if(l)l.value='';
  const miss=document.getElementById('mr-miss');if(miss)miss.checked=false;
}
/** Deletes a single roll entry (after confirmation) from the currently viewed session. */
function deleteRoll(rollId){
  const sess=S.sessions[S.viewingSessionId||S.currentSessionId];
  if(!sess)return;
  const idx=sess.rolls.findIndex(r=>r.id===rollId);
  if(idx===-1)return;
  if(!confirm('Delete this roll entry? This cannot be undone.'))return;
  sess.rolls.splice(idx,1);
  updateHistory();updateStats();buildSessions();save();
  toast('Roll deleted');
}

  <div style="display:flex;gap:6px">
    <button onclick="saveRollFull('${rollId}')" style="background:var(--accent);border:none;border-radius:6px;color:#fff;padding:4px 12px;cursor:pointer;font-size:12px;font-weight:600">Save</button>
    <button onclick="updateHistory()" style="background:none;border:1px solid var(--border);border-radius:6px;color:var(--text2);padding:4px 10px;cursor:pointer;font-size:12px">Cancel</button>
    <button onclick="deleteRoll('${rollId}')" style="background:none;border:1px solid var(--danger);border-radius:6px;color:var(--danger);padding:4px 10px;cursor:pointer;font-size:12px;margin-left:auto">Delete</button>
  </div>`;
}
/** Saves the inline full-edit form started by editRollFull(). */
function saveRollFull(rollId){
  const sess=S.sessions[S.viewingSessionId||S.currentSessionId];
  if(!sess)return;
  const roll=sess.rolls.find(r=>r.id===rollId);
  if(!roll)return;
  const g=id=>document.getElementById(id);
  const newTot=parseInt(g('ef-tot-'+rollId).value);
  if(!isNaN(newTot))roll.total=newTot;
  const notationRaw=g('ef-notation-'+rollId).value.trim();
  const parsed=parseDiceNotation(notationRaw);
  if(parsed){
    roll.notation=notationRaw;
    roll.count=parsed.count;
    roll.sides=parsed.sides;
    roll.modifier=parsed.modifier;
  }else{
    toast('Invalid dice notation — keeping previous value');
  }
  const indiv=g('ef-ind-'+rollId).value.trim();
  if(indiv){
    const vals=parseIndivValues(indiv);
    if(vals===null){toast('Dice Values must be colon-separated, e.g. 4:9');}
    else if(vals.length)roll.results=vals.map(v=>({val:v,kept:true,dropped:false}));
  }
  const lbl=g('ef-lbl-'+rollId).value.trim();
  const cmt=g('ef-cmt-'+rollId).value.trim();
  roll.comment=cmt;
  roll.label=lbl;
  roll.miss=g('ef-miss-'+rollId).checked;
  save();updateHistory();toast('Entry updated');
}

/** App entry point: populates the label dropdown, loads state, applies theme, and renders the initial view. */
function init(){
  document.getElementById('mr-label').innerHTML=skillOptions();
  load();
  if(S.theme==='light'){document.body.className='light';document.getElementById('themeBtn').textContent='🌙';}
  buildSessions();
  updateHistory();updateStats();
  const sess=S.sessions[S.currentSessionId];
  const lbl=document.getElementById('histSessionNameLabel');
  if(sess&&lbl)lbl.textContent=sess.name;
}
init();
</script>
</body>
</html>
